services:
  postgres:
    image: postgres:16-alpine
    container_name: ttt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: ttt_nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up \
          --database.address postgres:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/nakama &&
        exec /nakama/nakama \
          --config /nakama/data/modules/nakama-config.yml \
          --database.address postgres:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/nakama
    volumes:
      - ./nakama-modules:/nakama/data/modules
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: